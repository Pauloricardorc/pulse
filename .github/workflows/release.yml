name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ─── Windows: portable zip + .exe installer via Inno Setup ───────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.9'
      - run: flutter --version
      - run: flutter pub get
      - run: flutter build windows --release

      - name: Package portable zip
        shell: pwsh
        run: |
          Compress-Archive `
            -Path build/windows/x64/runner/Release/* `
            -DestinationPath pulse-windows-portable.zip

      - name: Build installer with Inno Setup
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}".TrimStart('v')
          if (-not $tag) { $tag = "2.0.0" }
          (Get-Content packaging/windows/pulse.iss) `
            -replace '@VERSION@', $tag `
            | Set-Content packaging/windows/pulse.gen.iss
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" packaging/windows/pulse.gen.iss

      - uses: actions/upload-artifact@v4
        with:
          name: pulse-windows
          path: |
            pulse-windows-portable.zip
            packaging/windows/Output/pulse-setup-*.exe

  # ─── Linux: AppImage (1 file, no deps) + .deb ───────────────────────────
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.9'
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config \
            libgtk-3-dev libsecret-1-dev libnotify-dev libayatana-appindicator3-dev \
            fuse libfuse2
      - run: flutter pub get
      - run: flutter build linux --release

      - name: Stage AppDir
        run: |
          bash packaging/linux/build-appimage.sh

      - name: Build .deb
        run: |
          bash packaging/linux/build-deb.sh

      - uses: actions/upload-artifact@v4
        with:
          name: pulse-linux
          path: |
            packaging/linux/dist/*.AppImage
            packaging/linux/dist/*.deb

  # ─── macOS: zipped .app ──────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.9'
      - run: flutter pub get
      - run: flutter build macos --release
      - name: Zip .app
        run: |
          cd build/macos/Build/Products/Release
          ditto -c -k --sequesterRsrc --keepParent pulse_v2.app pulse-macos.zip
          mv pulse-macos.zip $GITHUB_WORKSPACE/
      - uses: actions/upload-artifact@v4
        with:
          name: pulse-macos
          path: pulse-macos.zip

  # ─── Publish all artifacts on a GitHub Release ───────────────────────────
  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Flatten
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.zip" -o -name "*.exe" -o -name "*.AppImage" -o -name "*.deb" \) \
            -exec cp {} release/ \;
          ls -la release
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*

  # ─── Generate appcast.xml and commit to main ────────────────────────────
  # Sparkle (macOS) and WinSparkle (Windows) read this XML to detect new
  # versions and download the right enclosure per OS.
  appcast:
    needs: [release]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Generate appcast.xml
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DATE="$(date -R)"
          REPO="${{ github.repository }}"

          cat > appcast.xml <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
            <channel>
              <title>Pulse</title>
              <link>https://github.com/${REPO}</link>
              <description>Pulse update feed</description>
              <language>pt-BR</language>

              <item>
                <title>Versão ${VERSION}</title>
                <sparkle:version>${VERSION}</sparkle:version>
                <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
                <pubDate>${DATE}</pubDate>

                <enclosure
                  url="https://github.com/${REPO}/releases/download/v${VERSION}/pulse-macos.zip"
                  sparkle:os="macos"
                  sparkle:version="${VERSION}"
                  sparkle:shortVersionString="${VERSION}"
                  length="0"
                  type="application/octet-stream" />

                <enclosure
                  url="https://github.com/${REPO}/releases/download/v${VERSION}/pulse-setup-${VERSION}.exe"
                  sparkle:os="windows"
                  sparkle:version="${VERSION}"
                  sparkle:shortVersionString="${VERSION}"
                  length="0"
                  type="application/octet-stream" />
              </item>
            </channel>
          </rss>
          EOF

      - name: Commit appcast.xml
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          file_pattern: appcast.xml
          commit_message: "chore: appcast for ${{ github.ref_name }}"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "41898282+github-actions[bot]@users.noreply.github.com"
