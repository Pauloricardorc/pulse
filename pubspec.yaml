name: pulse_v2
description: "Pulse — Desktop service monitoring app (v2)."
publish_to: 'none'
version: 2.0.3+4

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1

  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.29
  path_provider: ^2.1.5
  path: ^1.9.1

  dio: ^5.8.0+1
  fl_chart: ^0.70.2

  tray_manager: ^0.5.0
  window_manager: ^0.4.3
  local_notifier: ^0.1.6
  auto_updater: ^0.2.1

  google_fonts: ^6.2.1
  shared_preferences: ^2.5.5
  file_picker: ^8.1.7
  url_launcher: ^6.3.1
  package_info_plus: ^8.1.2
  intl: ^0.20.2
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  build_runner: ^2.4.14
  drift_dev: ^2.22.1
  flutter_launcher_icons: ^0.14.4
  image: ^4.3.0

flutter_launcher_icons:
  image_path: assets/icons/app_icon.png
  windows:
    generate: true
    image_path: assets/icons/app_icon.png
  linux:
    generate: true
    image_path: assets/icons/app_icon.png
  macos:
    generate: true
    image_path: assets/icons/app_icon.png

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
